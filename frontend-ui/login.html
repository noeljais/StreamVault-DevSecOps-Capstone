<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault | Secure Access</title>
    <style>
        :root {
            --bg-dark: #07070a;
            --brand-red: #E50914;
            --text-main: #f5f5f5;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        #networkCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; 
            background: radial-gradient(circle at center, #140d10 0%, var(--bg-dark) 100%);
        }

        .login-box {
            position: relative; z-index: 10; 
            background: rgba(12, 12, 15, 0.6); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px; border-radius: 12px; width: 100%; max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(229, 9, 20, 0.2); 
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            user-select: none; -webkit-user-select: none;
        }

        @keyframes slideUpFade { 
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); } 
        }

        h1 { 
            margin: 0 0 10px 0; color: var(--brand-red); text-align: center; 
            font-size: 2.8rem; letter-spacing: 3px; text-transform: uppercase; 
            text-shadow: 1px 1px 0px #a30000, 2px 2px 0px #8a0000, 3px 3px 0px #700000, 0px 10px 20px rgba(229, 9, 20, 0.5);
        }

        p.subtitle { text-align: center; color: #888; margin-bottom: 35px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px;} 
        
        .input-group input {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid #330a0a; border-radius: 6px; color: white; font-size: 1rem;
            outline: none; box-sizing: border-box; transition: all 0.3s ease; 
            user-select: auto; -webkit-user-select: auto;
        }
        .input-group input:focus { border-color: var(--brand-red); box-shadow: 0 0 15px rgba(229, 9, 20, 0.2); transform: translateY(-2px); }

        .auth-btn {
            background: linear-gradient(135deg, #E50914 0%, #8b0000 100%); color: white;
            padding: 16px; width: 100%; border-radius: 6px; font-size: 1.1rem;
            font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease;
            margin-top: 15px; box-shadow: 0 5px 15px rgba(229, 9, 20, 0.2); 
            text-align: center; box-sizing: border-box; display: block;
        }
        .auth-btn:hover { background: linear-gradient(135deg, #ff0f1a 0%, #b30000 100%); transform: translateY(-2px); } 
        .auth-btn:active { transform: translateY(1px); }

        .error-msg { color: #ff6666; font-size: 0.85rem; text-align: center; margin-top: 15px; display: none; background: rgba(255, 102, 102, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(255, 102, 102, 0.2); } 
    </style>
</head>
<body>

    <canvas id="networkCanvas"></canvas>

    <div class="login-box">
        <h1>STREAMVAULT</h1>
        <p class="subtitle">Secure Gateway Access</p>

        <div>
            <div class="input-group">
                <label>Admin ID</label>
                <input type="text" id="auth_user" autocomplete="off" placeholder="Enter Identity">
            </div>
            
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="auth_key" placeholder="••••••••">
            </div>

            <div id="forceLoginBtn" class="auth-btn">AUTHORIZE</div>
            <div class="error-msg" id="errorMsg">Authentication Failed.</div>
        </div>
    </div>

    <script>
        document.getElementById('forceLoginBtn').addEventListener('click', function() {
            const btn = this;
            const errorBox = document.getElementById('errorMsg');
            btn.innerText = "AUTHORIZING...";
            errorBox.style.display = 'none';

            // Pulling from the new disguised IDs
            const u = document.getElementById('auth_user').value;
            const p = document.getElementById('auth_key').value;

            if(u.trim() === "" || p.trim() === "") {
                errorBox.innerText = "Please enter credentials.";
                errorBox.style.display = 'block';
                btn.innerText = "AUTHORIZE";
                return; 
            }

            fetch('http://localhost:8080/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(response => {
                if (response.ok) {
                    sessionStorage.setItem('StreamVault_Auth', 'SecureToken_Active');
                    window.location.replace('index.html');
                } else {
                    errorBox.innerText = "Access Denied.";
                    errorBox.style.display = 'block';
                    btn.innerText = "AUTHORIZE";
                }
            })
            .catch(error => {
                errorBox.innerText = "Server Offline.";
                errorBox.style.display = 'block';
                btn.innerText = "AUTHORIZE";
            });
        });

        // --- BACKGROUND CANVAS LOGIC ---
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let mouse = { x: null, y: null, radius: 200 };

        window.addEventListener('mousemove', function(event) { mouse.x = event.x; mouse.y = event.y; });
        window.addEventListener('mouseout', function() { mouse.x = undefined; mouse.y = undefined; });

        class Particle {
            constructor(x, y, directionX, directionY, size) {
                this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.baseX = this.x; this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.shadowBlur = 10; ctx.shadowColor = '#E50914'; ctx.fillStyle = '#E50914'; ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance; let forceDirectionY = dy / distance;
                let force = (mouse.radius - distance) / mouse.radius; if (force < 0) force = 0;
                
                let directionX = (forceDirectionX * force * this.density) * 0.6;
                let directionY = (forceDirectionY * force * this.density) * 0.6;

                if (distance < mouse.radius + this.size) {
                    this.x += directionX; this.y += directionY;
                } else {
                    if (this.x !== this.baseX) this.x -= (this.x - this.baseX)/20;
                    if (this.y !== this.baseY) this.y -= (this.y - this.baseY)/20;
                }
                this.x += this.directionX * 0.5; this.y += this.directionY * 0.5;
                this.baseX += this.directionX * 0.5; this.baseY += this.directionY * 0.5;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < 120; i++) {
                let size = (Math.random() * 2) + 1; 
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                particlesArray.push(new Particle(x, y, (Math.random() * 2) - 1, (Math.random() * 2) - 1, size));
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        ctx.strokeStyle = `rgba(229, 9, 20, ${1 - (distance / 150)})`;
                        ctx.lineWidth = 1; ctx.shadowBlur = 0;
                        ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate); ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) particlesArray[i].update();
            connect();
        }

        window.addEventListener('resize', function() { canvas.width = innerWidth; canvas.height = innerHeight; init(); });
        init(); animate();
    </script>
</body>
</html>
