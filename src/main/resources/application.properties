spring.application.name=ott-platform
# Server Port
server.port=8080

# Database Connection Settings
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ott_platform?useSSL=false&serverTimezone=UTC
spring.datasource.username=ott_admin

spring.datasource.password=Admin123!

# Hibernate / JPA Settings (This auto-creates our tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
