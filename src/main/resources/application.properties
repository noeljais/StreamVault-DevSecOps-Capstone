spring.application.name=ott-platform

# Server Port Configuration
server.port=8080

# ===================================================================
# STREAMVAULT DATABASE CONFIGURATION (DEV PROFILE)
# ===================================================================
# Note: createDatabaseIfNotExist ensures the target database initializes automatically
spring.datasource.url=jdbc:mysql://localhost:3306/streamvault_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# SECERITY COMPLIANCE: Replace placeholders with your environment credentials before running
spring.datasource.username=YOUR_LOCAL_DATABASE_USERNAME
spring.datasource.password=YOUR_LOCAL_DATABASE_PASSWORD

# ===================================================================
# HIBERNATE / JPA ENGINE SETTINGS
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect